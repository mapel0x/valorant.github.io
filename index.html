<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant | Home</title>
    <link rel="stylesheet" href="style.css">
    <!-- Meta tags for SEO -->
    <meta name="description" content="Play Valorant, a 5v5 character-based tactical shooter.">
</head>

<body>
    <header style="width: 100%; display: flex; flex-direction: column;">
        <div style="position: relative; width: 100%; overflow: hidden;">
            <img src="BG.avif" alt="Valorant Split Banner"
                style="width: 100%; height: auto; display: block; object-fit: cover;">
            <img src="2.avif" alt="Astra Full Art"
                style="position: absolute; right: 65%; bottom: 15%; height: 80%; z-index: 3; object-fit: contain;">
            <img src="logo.jpeg" alt="Astra Full Art"
                style="position: absolute; right: 76%; bottom: 87%; height: 9%; z-index: 3; object-fit: contain;">

            <!-- Vertical Navigation Carousel -->
            <div class="nav-v-carousel"
                style="position: absolute; top: 0; left: 0; height: 100%; width: 250px; display: flex; flex-direction: column; overflow-y: auto; scroll-snap-type: y mandatory; scroll-behavior: smooth; z-index: 10; align-items: center; background: linear-gradient(90deg, rgba(15,25,35,0.8) 0%, rgba(15,25,35,0) 100%);">
                <!-- Spacer for top centering -->
                <div style="flex: 0 0 35%; width: 100%;"></div>

                <div class="nav-v-item" data-href="maps.html">MAPS</div>
                <div class="nav-v-item active" data-href="signin.html">SIGN IN</div>
                <div class="nav-v-item" data-href="signup.html">SIGN UP</div>
                <div class="nav-v-item" data-href="contact.html">CONTACT US</div>
                <div class="nav-v-item" data-href="about.html">ABOUT US</div>

                <!-- Spacer for bottom centering -->
                <div style="flex: 0 0 35%; width: 100%;"></div>
            </div>

            <!-- Background Text Carousel -->
            <div class="text-carousel"
                style="position: absolute; top: 0; right: 0; width: 50%; height: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; align-items: center; scroll-behavior: smooth; padding: 0 25%; box-sizing: border-box; z-index: 5;">
                <div class="carousel-item" data-agent="BRIMSTONE"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 0.5; transform: scale(0.7); cursor: pointer;">
                    <img src="agent/AGENT/BRIMSTONE/Brimstone_Background_Text.webp"
                        style="height: 100%; object-fit: contain;">
                </div>
                <div class="carousel-item active" data-agent="ASTRA"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 1; transform: scale(1.1); cursor: pointer;">
                    <img src="agent/AGENT/ASTRA/Astra_Background_Text.webp" style="height: 100%; object-fit: contain;">
                </div>
                <div class="carousel-item" data-agent="BREACH"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 0.5; transform: scale(0.7); cursor: pointer;">
                    <img src="agent/AGENT/BREACH/Breach_Background_Text.webp"
                        style="height: 100%; object-fit: contain;">
                </div>
                <div class="carousel-item" data-agent="SOVA"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 0.5; transform: scale(0.7); cursor: pointer;">
                    <img src="agent/AGENT/SOVA/Sova_Background_Text.webp" style="height: 100%; object-fit: contain;">
                </div>
                <div class="carousel-item" data-agent="SAGE"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 0.5; transform: scale(0.7); cursor: pointer;">
                    <img src="agent/AGENT/SAGE/Sage_Background_Text.webp" style="height: 100%; object-fit: contain;">
                </div>
                <div class="carousel-item" data-agent="JETT"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 0.5; transform: scale(0.7); cursor: pointer;">
                    <img src="agent/AGENT/JETT/Jett_Background_Text.webp" style="height: 100%; object-fit: contain;">
                </div>
                <div class="carousel-item" data-agent="CHAMBER"
                    style="flex: 0 0 35%; height: 80%; scroll-snap-align: center; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; opacity: 0.5; transform: scale(0.7); cursor: pointer;">
                    <img src="agent/AGENT/CHAMBER/Chamber_Background_Text.webp"
                        style="height: 100%; object-fit: contain;">
                </div>
            </div>

            <style>
                /* Vertical Nav Carousel Styles */
                .nav-v-carousel::-webkit-scrollbar {
                    display: none;
                }

                .nav-v-carousel {
                    -ms-overflow-style: none;
                    scrollbar-width: none;
                }

                .nav-v-item {
                    flex: 0 0 30%;
                    width: 100%;
                    scroll-snap-align: center;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    transition: all 0.5s ease;
                    opacity: 0.3;
                    transform: scale(0.7) translateX(-20px);
                    cursor: pointer;
                    font-family: var(--font-heading);
                    font-weight: 700;
                    font-size: 2rem;
                    color: var(--val-white);
                    text-transform: uppercase;
                    letter-spacing: 2px;
                    text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
                }

                .nav-v-item.active {
                    opacity: 1;
                    transform: scale(1.3) translateX(10px);
                    color: var(--val-white);
                    text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
                }

                /* Text Carousel Styles (Right) */
                .text-carousel::-webkit-scrollbar {
                    display: none;
                }

                .text-carousel {
                    -ms-overflow-style: none;
                    scrollbar-width: none;
                }

                /* Hover floating effect */
                .carousel-item {
                    transform-origin: center center;
                }

                .carousel-item:hover {
                    transform: scale(0.7) translateY(-15px) !important;
                    filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.3));
                }

                .carousel-item.active:hover {
                    transform: scale(1.1) translateY(-15px) !important;
                    filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.5));
                }
            </style>

            <script>
                // Vertical Nav Carousel Logic
                const navCarousel = document.querySelector('.nav-v-carousel');
                const navItems = document.querySelectorAll('.nav-v-item');

                navCarousel.addEventListener('scroll', () => {
                    let center = navCarousel.scrollTop + navCarousel.offsetHeight / 2;
                    let minDiff = Infinity;
                    let activeIndex = 0;

                    navItems.forEach((item, i) => {
                        let itemCenter = item.offsetTop + item.offsetHeight / 2;
                        let diff = Math.abs(center - itemCenter);
                        if (diff < minDiff) {
                            minDiff = diff;
                            activeIndex = i;
                        }
                    });

                    navItems.forEach((item, i) => {
                        if (i === activeIndex) {
                            item.classList.add('active');
                        } else {
                            item.classList.remove('active');
                        }
                    });
                });

                navItems.forEach((item) => {
                    item.addEventListener('click', () => {
                        if (item.classList.contains('active')) {
                            window.location.href = item.getAttribute('data-href');
                        } else {
                            item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                });

                // Horizontal Text Carousel Logic
                const carousel = document.querySelector('.text-carousel');
                const items = document.querySelectorAll('.carousel-item');

                // Set initial scroll to center the active item
                window.addEventListener('load', () => {
                    const activeIndex = 1; // Astra
                    carousel.scrollLeft = items[activeIndex].offsetLeft - (carousel.offsetWidth / 2) + (items[activeIndex].offsetWidth / 2);
                });

                carousel.addEventListener('scroll', () => {
                    let center = carousel.scrollLeft + carousel.offsetWidth / 2;
                    let minDiff = Infinity;
                    let activeIndex = 0;

                    items.forEach((item, i) => {
                        let itemCenter = item.offsetLeft + item.offsetWidth / 2;
                        let diff = Math.abs(center - itemCenter);
                        if (diff < minDiff) {
                            minDiff = diff;
                            activeIndex = i;
                        }
                    });

                    items.forEach((item, i) => {
                        if (i === activeIndex) {
                            item.style.opacity = '1';
                            item.style.transform = 'scale(1.1)';
                            item.classList.add('active');
                        } else {
                            item.style.opacity = '0.5';
                            item.style.transform = 'scale(0.7)';
                            item.classList.remove('active');
                        }
                    });
                });

                // Click to scroll or navigate
                items.forEach((item) => {
                    item.addEventListener('click', () => {
                        if (item.classList.contains('active')) {
                            // If it's already in the center (active), navigate
                            window.location.href = 'characters.html?agent=' + item.getAttribute('data-agent');
                        } else {
                            // Otherwise, scroll it to the center
                            item.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                        }
                    });
                });
            </script>
        </div>
    </header>

    <footer>
        <p>&copy; 2026 Riot Games, Inc. Riot Games, VALORANT, and any associated logos are trademarks, service marks,
            and/or registered trademarks of Riot Games, Inc.</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Contact Valorant Support.">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <img src="logo.jpeg" alt="Valorant Logo">
            <span>VALORANT</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="characters.html">Characters</a></li>
            <li><a href="maps.html">Maps</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" class="active">Contact Us</a></li>
        </ul>
        <div class="nav-auth">
            <a href="signin.html" class="btn btn-outline">Sign In</a>
            <a href="signup.html" class="btn btn-primary">Sign Up</a>
        </div>
    </nav>

    <section class="section" style="max-width: 800px;">
        <h2 class="section-title">Report Issue</h2>
        <div class="contact-wrapper">
            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent!');">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="Describe the issue with specific details." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Message // Kirim Pesan</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Riot Games, Inc. Riot Games, VALORANT, and any associated logos are trademarks, service marks, and/or registered trademarks of Riot Games, Inc.</p>
    </footer>
</body>
</html>
